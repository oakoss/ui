name: Static analysis
description: Run oxlint, format check, markdown lint, and typecheck.

runs:
  using: composite
  steps:
    - name: oxlint
      shell: bash
      run: pnpm lint
    - name: Format check
      shell: bash
      run: pnpm format:check
    - name: Markdown lint
      shell: bash
      run: pnpm lint:md
    - name: Typecheck
      shell: bash
      run: pnpm typecheck
